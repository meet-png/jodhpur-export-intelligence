name: Weekly Data Refresh

# PRD §3.1 — the JEIS pipeline runs unattended every Sunday. The full
# ingest -> transform -> validate -> load refresh takes <15 min, so a
# single linear job (no matrix, no Airflow) is the right shape.

on:
  schedule:
    # 02:00 UTC every Sunday (07:30 IST) — before the Indian work week.
    - cron: "0 2 * * 0"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

# Never let two refreshes overlap (a slow run + the next cron tick would
# both TRUNCATE+reload fact_shipment).
concurrency:
  group: weekly-refresh
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      USD_INR_RATE: ${{ secrets.USD_INR_RATE }}
      RUN_MODE: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Run ETL pipeline
        run: python -m src.run_pipeline

      - name: Publish validation report to job summary
        if: always()
        run: python scripts/validation_summary.py >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: data/processed/validation_report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_FROM }}
          password: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          from: JEIS Pipeline <${{ secrets.ALERT_EMAIL_FROM }}>
          to: ${{ secrets.ALERT_EMAIL_TO }}
          subject: "[JEIS] Weekly refresh FAILED — run #${{ github.run_number }}"
          body: |
            The Jodhpur Export Intelligence weekly data refresh failed.

            Repository : ${{ github.repository }}
            Run        : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit     : ${{ github.sha }}
            Triggered  : ${{ github.event_name }}

            Check the run log and the validation-report artifact for the
            failing stage. The pipeline halts before the DB load on any
            validation failure (PRD FR-2), so the database still holds the
            last good snapshot.
